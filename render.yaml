services:
  - type: web
    name: dinamica-dashboard-financeiro
    env: python
    buildCommand: pip install -r requirements.txt && npm ci && npm run build
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    disk:
      name: dinamica-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_DATA_DIR
        value: /var/data
      - key: SIENGE_USERNAME
        sync: false
      - key: SIENGE_PASSWORD
        sync: false
      - key: SIENGE_INSTANCE
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: AUTO_SYNC_ON_BOOT
        value: "true"
      - key: AUTO_SYNC_INTERVAL
        value: "true"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
